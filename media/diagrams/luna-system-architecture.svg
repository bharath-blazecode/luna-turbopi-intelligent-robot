<svg xmlns="http://www.w3.org/2000/svg" width="680" height="506" viewBox="0 0 680 506" role="img">
  <title>LUNA TurboPi — system architecture</title>
  <desc>Layered architecture diagram. Top: Tkinter app and WonderEcho module as user interfaces. Middle: Raspberry Pi 4B containing Flask control server, voice command handler, and five feature modules. Bottom: mecanum chassis, camera module, servo gimbal, and ultrasonic sonar.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, system-ui, Arial, sans-serif; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

      .c-blue  > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .c-blue  > .th  { fill: #0C447C; }
      .c-blue  > .ts  { fill: #185FA5; }

      .c-gray  > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
      .c-gray  > .th  { fill: #444441; }
      .c-gray  > .ts  { fill: #5F5E5A; }

      .c-teal  > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .c-teal  > .th  { fill: #085041; }
      .c-teal  > .ts  { fill: #0F6E56; }

      .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .c-purple > .th  { fill: #3C3489; }
      .c-purple > .ts  { fill: #534AB7; }

      .c-coral > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
      .c-coral > .th  { fill: #712B13; }
      .c-coral > .ts  { fill: #993C1D; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User interfaces -->
  <g class="c-blue">
    <rect x="50" y="40" width="220" height="52" rx="8"/>
    <text class="th" x="160" y="61" text-anchor="middle" dominant-baseline="central">Tkinter control app</text>
    <text class="ts" x="160" y="79" text-anchor="middle" dominant-baseline="central">runs on laptop / PC</text>
  </g>

  <g class="c-blue">
    <rect x="410" y="40" width="220" height="52" rx="8"/>
    <text class="th" x="520" y="61" text-anchor="middle" dominant-baseline="central">WonderEcho module</text>
    <text class="ts" x="520" y="79" text-anchor="middle" dominant-baseline="central">offline voice recognition</text>
  </g>

  <!-- Communication arrows and labels -->
  <text class="ts" x="172" y="110" text-anchor="start" fill="#5F5E5A">HTTP / Wi-Fi</text>
  <line x1="160" y1="92" x2="160" y2="130" class="arr" marker-end="url(#arrow)"/>

  <text class="ts" x="508" y="110" text-anchor="end" fill="#5F5E5A">I²C bus 1</text>
  <line x1="520" y1="92" x2="520" y2="130" class="arr" marker-end="url(#arrow)"/>

  <!-- Pi container -->
  <g class="c-gray">
    <rect x="40" y="130" width="600" height="250" rx="14"/>
    <text class="th" x="340" y="150" text-anchor="middle" dominant-baseline="central">Raspberry Pi 4B</text>
    <text class="ts" x="340" y="168" text-anchor="middle" dominant-baseline="central">central computing platform</text>
  </g>

  <!-- Control layer -->
  <g class="c-teal">
    <rect x="60" y="182" width="250" height="48" rx="8"/>
    <text class="th" x="185" y="202" text-anchor="middle" dominant-baseline="central">Flask control server</text>
    <text class="ts" x="185" y="220" text-anchor="middle" dominant-baseline="central">HTTP routing · command dispatch</text>
  </g>

  <g class="c-teal">
    <rect x="370" y="182" width="250" height="48" rx="8"/>
    <text class="th" x="495" y="202" text-anchor="middle" dominant-baseline="central">Voice command handler</text>
    <text class="ts" x="495" y="220" text-anchor="middle" dominant-baseline="central">I²C polling · ID mapping</text>
  </g>

  <!-- Separator -->
  <line x1="62" y1="240" x2="618" y2="240" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.6"/>

  <!-- Feature modules row 1 -->
  <g class="c-purple">
    <rect x="60" y="248" width="170" height="48" rx="8"/>
    <text class="th" x="145" y="268" text-anchor="middle" dominant-baseline="central">Ball tracking</text>
    <text class="ts" x="145" y="286" text-anchor="middle" dominant-baseline="central">OpenCV · PID gimbal</text>
  </g>

  <g class="c-purple">
    <rect x="255" y="248" width="170" height="48" rx="8"/>
    <text class="th" x="340" y="268" text-anchor="middle" dominant-baseline="central">Manual control</text>
    <text class="ts" x="340" y="286" text-anchor="middle" dominant-baseline="central">mecanum movement</text>
  </g>

  <g class="c-purple">
    <rect x="450" y="248" width="170" height="48" rx="8"/>
    <text class="th" x="535" y="268" text-anchor="middle" dominant-baseline="central">Line following</text>
    <text class="ts" x="535" y="286" text-anchor="middle" dominant-baseline="central">VisualPatrol subprocess</text>
  </g>

  <!-- Feature modules row 2 -->
  <g class="c-purple">
    <rect x="155" y="310" width="170" height="48" rx="8"/>
    <text class="th" x="240" y="330" text-anchor="middle" dominant-baseline="central">Crash guard</text>
    <text class="ts" x="240" y="348" text-anchor="middle" dominant-baseline="central">sonar safety gate</text>
  </g>

  <g class="c-purple">
    <rect x="355" y="310" width="170" height="48" rx="8"/>
    <text class="th" x="440" y="330" text-anchor="middle" dominant-baseline="central">Voice snapshot</text>
    <text class="ts" x="440" y="348" text-anchor="middle" dominant-baseline="central">camera capture</text>
  </g>

  <!-- Pi to hardware arrows -->
  <line x1="119" y1="376" x2="119" y2="418" class="arr" marker-end="url(#arrow)"/>
  <line x1="267" y1="376" x2="267" y2="418" class="arr" marker-end="url(#arrow)"/>
  <line x1="415" y1="376" x2="415" y2="418" class="arr" marker-end="url(#arrow)"/>
  <line x1="563" y1="376" x2="563" y2="418" class="arr" marker-end="url(#arrow)"/>

  <!-- Hardware layer -->
  <g class="c-coral">
    <rect x="51" y="418" width="135" height="48" rx="8"/>
    <text class="th" x="119" y="438" text-anchor="middle" dominant-baseline="central">Mecanum chassis</text>
    <text class="ts" x="119" y="456" text-anchor="middle" dominant-baseline="central">PWM motors</text>
  </g>

  <g class="c-coral">
    <rect x="199" y="418" width="135" height="48" rx="8"/>
    <text class="th" x="267" y="438" text-anchor="middle" dominant-baseline="central">Camera module</text>
    <text class="ts" x="267" y="456" text-anchor="middle" dominant-baseline="central">CSI interface</text>
  </g>

  <g class="c-coral">
    <rect x="347" y="418" width="135" height="48" rx="8"/>
    <text class="th" x="415" y="438" text-anchor="middle" dominant-baseline="central">Servo gimbal</text>
    <text class="ts" x="415" y="456" text-anchor="middle" dominant-baseline="central">PWM · 2-axis</text>
  </g>

  <g class="c-coral">
    <rect x="495" y="418" width="135" height="48" rx="8"/>
    <text class="th" x="563" y="438" text-anchor="middle" dominant-baseline="central">Ultrasonic sonar</text>
    <text class="ts" x="563" y="456" text-anchor="middle" dominant-baseline="central">I²C sensor</text>
  </g>
</svg>
